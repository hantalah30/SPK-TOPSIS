name: Upload macOS to Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  upload:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Build macOS
        run: npx electron-builder --mac --x64 --arm64 --publish never
      - name: List files
        run: ls -la dist/
      - name: Upload to Release tag 1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload 1 "dist/SPK TOPSIS - Pemilihan Laptop-1.0.0-mac.zip" "dist/SPK TOPSIS - Pemilihan Laptop-1.0.0-arm64-mac.zip" --clobber
